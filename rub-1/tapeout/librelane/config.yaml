meta:
  version: 3
  flow: Chip
  substituting_steps:

    # Magic reports some overlaps which can be ignored
    Checker.IllegalOverlap: null

    # Disable KLayout DRC
    #KLayout.DRC: null
    #Checker.KLayoutDRC: null

    # Disable magic DRC
    #Magic.DRC: null
    #Checker.MagicDRC: null

    # Disable KLayout antenna check
    #KLayout.Antenna: null
    #Checker.KLayoutAntenna: null

    # Disable KLayout density check
    #KLayout.Density: null
    #Checker.KLayoutDensity: null

    # Use Magic density-aware fill (replaces KLayout filler with reduced fine pass)
    KLayout.Filler: Magic.MetalFiller

    # Save time
    #OpenROAD.IRDropReport: null
    #KLayout.XOR: null
    #Netgen.LVS: null
    #Checker.LVS: null

DESIGN_NAME: rubteam1
VERILOG_FILES:
- dir::../src/chip_top.sv
- dir::../src/awesome-layr/rtl/main_controller.v
- dir::../src/awesome-layr/rtl/uart_tx.v
- dir::../src/awesome-layr/rtl/uart_rx.v
