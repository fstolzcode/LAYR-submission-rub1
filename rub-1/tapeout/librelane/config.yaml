- dir::../src/awesome-layr/rtl/eeprom.v
- dir::../src/awesome-layr/rtl/rc522.v
- dir::../src/awesome-layr/rtl/rc522_wrapper.v
- dir::../src/awesome-layr/rtl/aes/aes_top.v
- dir::../src/awesome-layr/rtl/aes/aes_round_datapath.v
- dir::../src/awesome-layr/rtl/aes/aes_key_schedule.v
- dir::../src/awesome-layr/rtl/aes_sbox.v
- dir::../src/awesome-layr/rtl/aes_mix_columns.v
- dir::../src/awesome-layr/rtl/aes_shift_rows.v
- dir::../src/awesome-layr/rtl/gadgets/HPC2And.sv
- dir::../src/awesome-layr/rtl/gadgets/HPC2Not.sv
- dir::../src/awesome-layr/rtl/gadgets/HPC2Xor.sv
- dir::../src/awesome-layr/rtl/gadgets/dff.sv
